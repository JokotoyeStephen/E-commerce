<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart | eTrade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-white shadow-sm py-4 px-6 flex justify-between items-center">
  <h1 class="text-2xl font-bold text-amber-800">eTrade</h1>
  <div class="flex items-center gap-6">
    <a href="shop.html">Shop</a>
    <a href="cart.html" class="text-amber-800 font-semibold">Cart</a>
  </div>
</nav>

<!-- CART SECTION -->
<section class="max-w-6xl mx-auto px-6 py-10">

  <h2 class="text-3xl font-bold mb-8 text-gray-800">Shopping Cart</h2>

  <div class="grid md:grid-cols-3 gap-8">

    <!-- Cart Items -->
    <div class="md:col-span-2 bg-white p-6 rounded-xl shadow-sm">
      <div id="cart-items"></div>
    </div>

    <!-- Cart Summary -->
    <div class="bg-white p-6 rounded-xl shadow-sm h-fit">
      <h3 class="text-xl font-semibold mb-4">Order Summary</h3>

      <div class="flex justify-between mb-2">
        <span>Subtotal</span>
        <span id="subtotal">₦0</span>
      </div>

      <div class="flex justify-between mb-2">
        <span>Shipping</span>
        <span>₦2,000</span>
      </div>

      <hr class="my-4">

      <div class="flex justify-between font-bold text-lg">
        <span>Total</span>
        <span id="total">₦0</span>
      </div>

      <button class="mt-6 w-full bg-amber-800 text-white py-3 rounded-lg hover:bg-amber-900 transition">
        Proceed to Checkout
      </button>
    </div>

  </div>

</section>
<script src="./script/cart.js"></script>

<script src="cart.js"></script>
</body>
</html>
