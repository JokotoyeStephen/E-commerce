<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eTrade UI Replica</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-gray-50 text-gray-800">

<!-- ================= HEADER ================= -->
<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between gap-4">

    <!-- Logo -->
    <div class="flex items-center gap-2">
      <i class="fa-solid fa-bag-shopping text-blue-600 text-2xl"></i>
      <span class="text-xl font-bold text-blue-600">eTrade</span>
    </div>

    <!-- Search -->
    <div class="hidden md:flex flex-1 mx-6">
      <div class="relative w-full">
        <input
          type="text"
          placeholder="What are you looking for..."
          class="w-full border rounded-full px-5 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
        <i class="fa fa-search absolute right-4 top-3 text-gray-400"></i>
      </div>
    </div>

    <!-- Controls -->
    <div class="flex items-center gap-4">
      <select class="border rounded px-2 py-1 text-sm">
        <option>USD</option>
        <option>EUR</option>
      </select>

      <select class="border rounded px-2 py-1 text-sm">
        <option>EN</option>
        <option>FR</option>
      </select>

      <i class="fa-regular fa-heart text-xl cursor-pointer"></i>

      <div class="relative">
        <i class="fa fa-shopping-cart text-xl cursor-pointer"></i>
        <span class="absolute -top-2 -right-2 bg-blue-600 text-white text-xs rounded-full px-1">3</span>
      </div>

      <i class="fa-regular fa-user text-xl cursor-pointer"></i>
    </div>
  </div>
</header>

<!-- ================= MAIN ================= -->
<main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-12 gap-6">

  <!-- ========== SIDEBAR ========== -->
  <aside class="col-span-12 md:col-span-3 bg-white rounded-lg shadow p-4">
    <h3 class="font-semibold text-white bg-blue-600 px-4 py-3 rounded mb-4 flex items-center gap-2">
      <i class="fa fa-bars"></i> Categories
    </h3>

    <ul class="space-y-3 text-sm">
      <li class="flex justify-between cursor-pointer hover:text-blue-600">
        <span><i class="fa fa-shirt mr-2"></i>Fashion</span><i class="fa fa-chevron-down"></i>
      </li>
      <li class="flex justify-between cursor-pointer hover:text-blue-600">
        <span><i class="fa fa-tv mr-2"></i>Electronics</span><i class="fa fa-chevron-down"></i>
      </li>
      <li class="flex justify-between cursor-pointer hover:text-blue-600">
        <span><i class="fa fa-couch mr-2"></i>Home Decor</span><i class="fa fa-chevron-down"></i>
      </li>
      <li><span><i class="fa fa-pills mr-2"></i>Medicine</span></li>
      <li><span><i class="fa fa-chair mr-2"></i>Furniture</span></li>
      <li><span><i class="fa fa-scissors mr-2"></i>Crafts</span></li>
      <li><span><i class="fa fa-camera mr-2"></i>Camera</span></li>
    </ul>
  </aside>

  <!-- ========== CONTENT ========== -->
  <section class="col-span-12 md:col-span-9 space-y-6">

    <!-- NAV -->
    <nav class="bg-white rounded-lg shadow px-6 py-4 flex gap-6 text-sm font-medium">
      <a class="hover:text-blue-600 cursor-pointer">Home</a>
      <a class="hover:text-blue-600 cursor-pointer">Shop</a>
      <a class="hover:text-blue-600 cursor-pointer">Pages</a>
      <a class="hover:text-blue-600 cursor-pointer">About</a>
      <a class="hover:text-blue-600 cursor-pointer">Blog</a>
      <a class="hover:text-blue-600 cursor-pointer">Contact</a>
    </nav>

    <!-- HERO -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Slider -->
      <div class="lg:col-span-2 bg-white rounded-lg shadow p-6 flex items-center relative overflow-hidden">
        <div>
          <span class="text-pink-500 font-semibold text-sm">Smartwatch</span>
          <h1 class="text-4xl font-bold mt-2">Delux Brand Watch</h1>
          <button class="mt-6 inline-flex items-center gap-2 text-blue-600 font-medium">
            Shop Now <i class="fa fa-arrow-right"></i>
          </button>
        </div>

        <img
          src="./images/Shopee.jpg"
          class="absolute right-4 bottom-4 w-56 hidden sm:block"
          alt="watch"
        />
      </div>

      <!-- Product Card -->
      <div class="bg-white rounded-lg shadow p-4 text-center">
        <img
          src="./images/neon-motherboard-background.jpg"
          class="mx-auto h-48 object-contain"
        />
        <h4 class="mt-4 font-medium">Yantiti Leather Bag</h4>
        <p class="text-blue-600 font-bold mt-1">$29.99</p>
        <button class="mt-3 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
          Add to Cart
        </button>
      </div>

    </div>
  </section>
</main>

<!-- ================= JS INTERACTIONS ================= -->
<script>
  // Example: future dropdown or slider logic can go here
  console.log("eTrade UI Loaded");
</script>

</body>
</html>
