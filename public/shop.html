<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shop | eTrade</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body class="bg-gray-50">

<!-- NAVBAR -->
<nav class="bg-white shadow-sm py-4 px-6 flex justify-between items-center">
  <h1 class="text-2xl font-bold text-amber-800">eTrade</h1>

  <div class="flex items-center gap-6">
    <a href="index.html" class="hover:text-amber-800">Home</a>
    <a href="shop.html" class="text-amber-800 font-semibold">Shop</a>
    <a href="#" class="hover:text-amber-800">Cart</a>
    <a href="#" class="hover:text-amber-800">Login</a>
  </div>
</nav>


<!-- SHOP SECTION -->
<section class="max-w-7xl mx-auto px-6 py-10">

  <!-- Search + Sort -->
  <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">

    <div class="w-full md:w-1/2 flex">
      <input type="text"
        placeholder="Search products..."
        class="w-full px-4 py-2 border rounded-l-lg focus:outline-none">
      <button class="bg-amber-800 text-white px-5 rounded-r-lg">
        <i class="fa fa-search"></i>
      </button>
    </div>

    <select class="px-4 py-2 border rounded-lg">
      <option>Sort by Latest</option>
      <option>Sort by Price: Low to High</option>
      <option>Sort by Price: High to Low</option>
    </select>

  </div>


  <div class="grid grid-cols-1 md:grid-cols-4 gap-8">

    <!-- SIDEBAR FILTER -->
    <aside class="bg-white p-6 rounded-xl shadow-sm h-fit">

      <h2 class="font-bold text-lg mb-4">Categories</h2>

      <ul class="space-y-3 text-sm">
        <li><input type="checkbox"> Apparel & Fashion</li>
        <li><input type="checkbox"> Electronics</li>
        <li><input type="checkbox"> Beauty</li>
        <li><input type="checkbox"> Home & Living</li>
        <li><input type="checkbox"> Furniture</li>
      </ul>

      <hr class="my-6">

      <h2 class="font-bold text-lg mb-4">Price Range</h2>

      <input type="range" class="w-full">

      <div class="flex justify-between text-sm mt-2">
        <span>₦0</span>
        <span>₦500,000</span>
      </div>

    </aside>


    <!-- PRODUCT GRID -->
    <div class="md:col-span-3 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      <!-- PRODUCT CARD -->
      <div class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition">

        <img src="https://via.placeholder.com/200"
          class="h-40 mx-auto object-contain">

        <h3 class="mt-4 font-semibold text-gray-800">
          Wireless Bluetooth Headphones
        </h3>

        <!-- Rating -->
        <div class="text-yellow-400 mt-2">
          <i class="fa fa-star"></i>
          <i class="fa fa-star"></i>
          <i class="fa fa-star"></i>
          <i class="fa fa-star"></i>
          <i class="fa fa-star-half"></i>
        </div>

        <!-- Price -->
        <div class="mt-2">
          <span class="text-amber-800 font-bold text-lg">₦35,000</span>
          <span class="text-gray-400 line-through ml-2">₦42,000</span>
        </div>

        <button class="mt-4 w-full bg-amber-800 text-white py-2 rounded-lg hover:bg-amber-900 transition">
          Add To Cart
        </button>

      </div>


      <!-- Duplicate Product -->
      <div class="bg-white p-5 rounded-xl shadow-sm hover:shadow-md transition">

        <img src="https://via.placeholder.com/200"
          class="h-40 mx-auto object-contain">

        <h3 class="mt-4 font-semibold text-gray-800">
          Luxury Wrist Watch
        </h3>

        <div class="text-yellow-400 mt-2">
          <i class="fa fa-star"></i>
          <i class="fa fa-star"></i>
          <i class="fa fa-star"></i>
          <i class="fa fa-star"></i>
        </div>

        <div class="mt-2">
          <span class="text-amber-800 font-bold text-lg">₦18,500</span>
        </div>

        <button class="mt-4 w-full bg-amber-800 text-white py-2 rounded-lg hover:bg-amber-900 transition">
          Add To Cart
        </button>

      </div>

    </div>

  </div>

</section>


<!-- FOOTER -->
<footer class="bg-gray-900 text-gray-400 text-center py-6 mt-16">
  © 2026 eTrade Marketplace. All rights reserved.
</footer>


</body>
</html>
